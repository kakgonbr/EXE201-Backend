    #       sudo chmod -R 775 /var/www/images
    #       sudo find /var/www/images -type d -exec chmod g+s {} \;


    - name: Restart service on VPS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_KEY }}
        script: |
          sudo chmod +x /opt/exe/EXE-Backend
          sudo chown -R exe:exe /opt/exe
          sudo systemctl restart exe.service